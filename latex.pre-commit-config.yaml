repos:
  - repo: local
    hooks:
      - id: aspell-check
        name: Aspell Spell Checker
        description: Spell-check LaTeX files and fail on unknown words
        entry: >
          bash -c '
            for file in "$@"; do
              output=$(aspell --mode=tex --home-dir=. --personal=.aspell.en.pws list < "$file" | sort -u)
              if [ -n "$output" ]; then
                echo "$output"
                exit 1
              fi
            done
          ' --
        language: system
        files: \.tex$

      - id: proselint-local
        name: Proselint (local install)
        description: Grammar and style checker using your local proselint config
        entry: >
          bash -c '
            for file in "$@"; do
              proselint "$file" || exit 1
            done
          ' --
        language: system
        files: \.(md|txt|tex)$

      - id: latexmk-compile
        name: LaTeX compile with latexmk (biber enforced)
        description: Compile LaTeX using latexmk with biber, fail on error
        entry: >
          bash -c '
            set -e
            for file in "$@"; do
              echo "📄 Checking $file with latexmk (biber)..."
              latexmk -r .latexmkrc -pdf -silent -use-make "$file" || {
                echo "❌ latexmk failed on $file"
                exit 1
              }
            done
          ' --
        language: system
        files: \.tex$

      - id: pandoc-md-to-pdf
        name: Pandoc Markdown to PDF
        description: Convert Markdown (.md) files to PDFs using Pandoc and a custom XeLaTeX template
        entry: >
          bash -c '
            for file in "$@"; do
              base="${file%.md}"
              output="${base}.pdf"
              echo "📄 Converting $file -> $output"
              pandoc "$file" -o "$output" --pdf-engine=xelatex -H md2pdftemplate.tex
            done
          ' --
        language: system
        files: \.md$

  - repo: https://github.com/jonasbb/pre-commit-latex-hooks
    rev: v1.4.0
    hooks:
      - id: american-eg-ie
      - id: cleveref-capitalization
      - id: consistent-spelling
        args:
          - --emph=et al.
          - --emph=a priori
          - --emph=a posteriori
          - --regex=naive=\\bna(i|\\\"i)ve
      - id: csquotes
      - id: ensure-labels-for-sections
      # Uncomment to ignore label content
      # args:
      #   - --ignore-label-content
      - id: no-space-in-cite
      - id: tilde-cite
      - id: unique-labels
      - id: cleveref-instead-of-autoref

