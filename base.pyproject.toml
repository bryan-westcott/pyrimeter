# These are boilerplate standard configuration options including development
# tools, notebooks and popular linters/formatters/type-checkers

[project]
name = "<PROJECT_NAME>"
description = "<PROJECT_DESCRIPTION>"
requires-python = "==3.<PYTHON_MINOR_VERSION>.*"
readme = "README.md"
version = "0.0.1"
dependencies = ["opencv-contrib-python==4.11.0.86", "loguru"]

# Note: these install with: `uv sync --group x` and are not packaged
# Warning: these will be removed on subsequent `uv sync` without this group
[dependency-groups]

# Common developer/analysis tools
# Note: dev groups installed by default with a `uv sync`
dev = [
  "pandas>=2.2.2",
  "seaborn>=0.13.2",
  "matplotlib>=3.7.3",
  "statsmodels>=0.14.2",
]

# For notebook support
# Note: installed by safe-sync.sh by default
# Note: dev-init.sh will register the uv environment as a kernel
notebook = [
  # these two are critical
  "jupyterlab>=3.6.8",
  "ipykernel>=6.29.5",
]

# these are nice to have and fairly lightweight
notbook-extras = [
  "jupyter>=1.1.1",
  "nbconvert>=7.16.4",
  "nbqa>=1.9.1",
  "itables>=2.2.4",
  "ipycache>=0.1.4",
  "ipympl>=0.9.5",
  "ipywidgets>=8.1.3",
]

# These have heavier dependencies (JS, latex, etc)
# Only install if needed or sync times will suffer
notebook-heavy = [
  "jupyterlab-latex>=4.3.0",
  "jupyterlab-theme-solarized-dark>=3.0.1",
  "jupyterlab-github>=3.0.1",
  "jupyterlab-spellchecker>=0.8.3",
  "ipyplot>=1.1.2",
  "jupyterlab-git>=0.50.2",
]

# For CI/CD, linting, pre-commit, and type check stubs
# Note: installed with safe-sync.sh
tooling = [
  "pre-commit>=4.3.0",
  "pre-commit-uv>=4.2.0", # different from uv-pre-commit below; both are needed!
  "yamllint>=1.37.1",
  "ruff>=0.14.1",
  "mypy>=1.18.2",
  "docformatter>=1.7.7",  # <=1.76 incompatible with pre-commit 4.0+
  "taplo>=0.9.3",         # for toml
  # stubs only below, will not install underlying package
  "boto3-stubs>=1.38.10",
  "matplotlib-stubs>=0.1.0",
  "ml-dtypes>=0.5.1",
  "mypy-boto3-s3>=1.38.0",
  "pandas-stubs>=2.2.3.250308",
  "types-pillow>=10.2.0.20240822",
  "types-python-dateutil>=2.9.0.20241206",
  "types-pytz>=2025.2.0.20250326",
  "types-pyyaml>=6.0.12.20250402",
  "types-requests>=2.32.0.20250328",
  "types-tqdm>=4.67.0.20250417",
]

# These can be installed like pyproj_template[test]
# or with sync as `uv sync --extra x`
[project.optional-dependencies]

# Dependencies
# Note: will not install automatically, requires `uv sync --with tests`
# Note: will not install unless [build-system] setup
# Note: installed by default in safe-sync.sh
test = [
  "pytest>=8.2",
  "pytest-cov>=5.0",           # coverage report plugin
  "pytest-xdist",
  "pytest-codeblocks>=0.17.0", # run code blocks in markdown (```python ... ```) as tests
  "pytest-doctestplus>=1.4.0", # extended doctest support (e.g. skip directives, advanced parsing, particularly for codeblocks)
  "xdoctest>=1.2.0",
  "hypothesis",
]

# To build a wheel/sdist, with:
# uv build
[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

# entrypoint for tests
[project.scripts]
# quick
pytest-smoke = "<PROJECT_NAME>.tests.test:smoke"

# Pytest config (minimal and portable)
[tool.pytest.ini_options]
# Don't set pythonpath, rely on editable install
testpaths = ["src/<PROJECT_NAME>/tests"]
python_files = ["test.py"]
# collect functions for possible use
python_functions = ["smoke"]
# Default flags: no stdout spam, show locals on failure, fail on unknown marks
addopts = """
  -q
  --strict-markers
  --showlocals
  --maxfail=1
  --codeblocks
  --doctest-modules
  --xdoctest
  --xdoctest-style=google
  --cov=<PROJECT_NAME>
  --cov-report=term-missing
"""
# Declare marks
# See decorators in actual test code
# Selectively run with: pytest -m <marker>
markers = ["smoke: fast smoke tests that run on CPU"]


[tool.uv]

# never use system python
python-preference = "only-managed"
# prevent duplicate (and conflicting) opencv, so use the most complete
# version: contrib (extra modules), non-headeless (has gui even if not used)
override-dependencies = [
  "opencv-python>=4.11.0.86 ; sys_platform == 'never'",
  "opencv-python-headless>=4.11.0.86 ; sys_platform == 'never'",
  "opencv-contrib-python-headless>=4.11.0.86 ; sys_platform == 'never'",
]

[tool.uv.sources]
# ensure we get cuda-enabled torch repo, must also set tool.uv.index below
torch = { index = "pytorch-cuda-repo" }
torchvision = { index = "pytorch-cuda-repo" }
diffusers = { git = "https://github.com/huggingface/diffusers.git", tag = "v0.31.0" }

[[tool.uv.index]]
# also set tool.uv.sources
name = "pytorch-cuda-repo"
url = "https://download.pytorch.org/whl/cu<CUDA_MAJOR_VERSION><CUDA_MINOR_VERSION>"
explicit = true

# so we can use src as editable package
# with: uv pip install -e .
[tool.setuptools]
package-dir = { "" = "src" }

[tool.black]
line-length = 88
target-version = ["py3<PYTHON_MINOR_VERSION>"]
include = '''
(
  src/
)
'''
exclude = '''
(
    checkpoints
  | __pycache__
  | \.idea
  | \.mypy_cache
  | \.git
  | test
  | \.git
  | data
  | dreambooth
  | lcm_distill
)
'''
force-exclude = '''
(
    checkpoints
  | __pycache__
  | \.idea
  | \.mypy_cache
  | \.git
  | test
  | \.git
  | data
  | *.egg-info
)
'''

[tool.mypy]
python_version = "3.<PYTHON_MINOR_VERSION>"
# exclude packages without typehints
follow_imports = "skip"
files = ["src/"]
exclude = [
  "checkpoints/",
  "test/",
  ".idea/",
  "__pycache/",
  "dreambooth",
  "lcm_distill",
  "notebooks",
]
disable_error_code = "import-untyped"
# TODO: turn this on and fix any errors found
#check_untyped_defs = true


[[tool.mypy.overrides]]
# modules that mypy has no typehints for
module = [
  "transformers.*",
  "polyfuzz",
  "nltk.*",
  "huggingface_hub.*",
  "statsmodels.*",
  "scipy.stats",
  "scipy.ndimage.*",
  "scipy.signal.*",
  "mediapipe",
  "runpod.*",
  "cog",
  "accelerate.*",
  "bitsandbytes",
  "datasets",
  "torchvision.*",
  "xformers",
  "skvideo.*",
  "prodigy_opt",
  "controlnet_aux",
]
ignore_errors = true


[tool.ruff]
# Exclude a variety of commonly ignored directories.
src = ["src"]
# Add to default, don't replace
extend-exclude = [
  ".pyenv",
  ".pytest_cache",
  ".vscode",
  "__pypackages__",
  "site-packages",
  "venv",
  ".checkpoints",
  "./__pycache__/",
  ".mypy_cache",
  "./idea/",
  "./test/",
]
# Black uses 88, default is 240
line-length = 120
indent-width = 4
# Assume Python version, default is 3.8
target-version = "py3<PYTHON_MINOR_VERSION>"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  "D200",
  "S603",
  "PTH123",
  "FBT",
  "C408",
  "DTZ011",
  "EM101",
  "TRY003",
  "TC002",
]
# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []
# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.lint.flake8-annotations]
allow-star-arg-any = true

[tool.ruff.lint.pep8-naming]
# explicitly allowed pep8 name violations, common with diffusers/opencv
ignore-names = ["H", "W", "C", "HWC3", "bboxC"]

[tool.ruff.lint.mccabe]
# Allow more complexity for R&D projects
max-complexity = 13

[tool.ruff.format]
# Like Black, use double quotes for strings.
quote-style = "double"
# Like Black, indent with spaces, rather than tabs.
indent-style = "space"
# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false
# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"
# Enable auto-formatting of code examples in docstrings. Markdown,
# reStructuredText code/literal blocks and doctests are all supported.
# This is currently disabled by default, but it is planned for this
# to be opt-out in the future.
docstring-code-format = true
# Set the line length limit used when formatting code snippets in
# docstrings.
# This only has an effect when the `docstring-code-format` setting is
# enabled.
docstring-code-line-length = "dynamic"


[tool.ruff.lint.pydocstyle]
convention = "pep257"

[tool.shellcheck]
version = "0.11.0"

[tool.prettier]
# only version<3 supported by ubuntu 22.04
# only version<=2.7.1 supported by
#   https://github.com/pre-commit/mirrors-prettier/
version = "4.0.0-alpha.8"

[tool.hadolint]
version = "2.14.0"

[tool.action-validator]
version = "0.8.0"

# Warning: this is a different tool than pre-commit-uv, differences:
# uv-pre-commit: a pre-commit hook used directly in .pre-commit-config.yaml
#                for checking lock file
# pre-commit-uv: a python package plugin that patches pre-commit to use uv
# Note: BOTH are needed
# Note: this is needed for pinning hook version in .pre-commit-config.yaml
[tool.uv-pre-commit]
version = "0.9.3"

[tool.yamlfmt]
version = "0.20.0"
