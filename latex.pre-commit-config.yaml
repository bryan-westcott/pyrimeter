repos:
  - repo: local
    hooks:
      - id: aspell-check
        name: Aspell Spell Checker
        description: Spell-check tex/md/txt files and fail on unknown words, use repo root dictionary, ingoring template files
        entry: >
          bash -c '
            set -e
            repo_root=$(git rev-parse --show-toplevel)
            for file in "$@"; do
              output=$(aspell --mode=tex --home-dir=${repo_root} --personal=${repo_root}/.aspell.en.pws list < "$file" | sort -u)
              if [ -n "$output" ]; then
                echo "$output"
                exit 1
              fi
            done
          ' --
        language: system
        files: (?<!\.template)\.(tex|md|txt)$  

      - id: proselint-local
        name: Proselint (local install)
        description: Grammar and style checker for tex/md/txt using your local proselint config in repo root, ignoring template files
        entry: >
          bash -c '
            set -e
            repo_root=$(git rev-parse --show-toplevel)
            for file in "$@"; do
              PROSELINT_CONFIG="$repo_root/.proselintrc.json" proselint "$file"
            done
          ' --
        language: system
        files: (?<!\.template)\.(tex|md|txt)$  

      - id: latexmk-compile
        name: LaTeX compile with latexmk (biber enforced)
        description: Compile LaTeX using latexmk with biber, fail on error, ignore .template.tex files
        entry: >
          bash -c '
            set -e
            repo_root=$(git rev-parse --show-toplevel)
            export LATEXMKRCRC="$repo_root/.latexmkrc"
            for file in "$@"; do
              [[ "$file" =~ \.template\.tex$ ]] && continue
              latexmk -pdf -interaction=nonstopmode "$file"
            done
          ' --
        language: system
        files: (?<!\.template)\.tex$  

      - id: pandoc-md-to-pdf
        name: Pandoc Markdown to PDF
        description: Convert Markdown (.md) files to PDFs using Pandoc and a custom XeLaTeX template of name <file>.template.tex for <file>.md, produces <file>.pdf
        entry: >
          bash -c '
            for file in "$@"; do
              base="${file%.md}"
              template="${base}.template.tex"
              output="${base}.pdf"
              if [ -f "$template" ]; then
                pandoc "$file" -o "$output" --pdf-engine=xelatex -H "$template"
              else
                echo "Template not found: $template" >&2
                exit 1
              fi
            done
          ' --
        language: system
        files: \.md$

  - repo: https://github.com/jonasbb/pre-commit-latex-hooks
    rev: v1.4.0
    hooks:
      - id: american-eg-ie
      - id: cleveref-capitalization
      - id: consistent-spelling
        args:
          - --emph=et al.
          - --emph=a priori
          - --emph=a posteriori
          - --regex=naive=\\bna(i|\\\"i)ve
      - id: csquotes
      - id: ensure-labels-for-sections
      # Uncomment to ignore label content
      # args:
      #   - --ignore-label-content
      - id: no-space-in-cite
      - id: tilde-cite
      - id: unique-labels
      - id: cleveref-instead-of-autoref

